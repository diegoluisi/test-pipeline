name: Feature Image Pipeline

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop
      - release
      - main

env:
  IMAGE_NAME: test-pipeline
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
  REGISTRY_DEV_REPOSITORY: ${{ secrets.REGISTRY_DEV_REPOSITORY }}
  REGISTRY_STAGE_REPOSITORY: ${{ secrets.REGISTRY_STAGE_REPOSITORY }}
  REGISTRY_PROD_REPOSITORY: ${{ secrets.REGISTRY_PROD_REPOSITORY }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
  COSIGN_KEY: ${{ secrets.COSIGN_KEY }}

jobs:
  pr-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v2
        with:
          dockerfile: Dockerfile

      - name: Build image for PR validation
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ github.repository }}:${{ github.sha }}-pr

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v2
        with:
          image-ref: ${{ github.repository }}:${{ github.sha }}-pr
          format: table
          exit-code: '1'

      - name: Install Syft for SBOM generation
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft . -o json > sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Install container structure test
        run: |
          curl -Lo /usr/local/bin/container-structure-test https://github.com/GoogleContainerTools/container-structure-test/releases/download/v1.8.1/container-structure-test-linux-amd64
          chmod +x /usr/local/bin/container-structure-test

      - name: Run container structure test
        run: |
          /usr/local/bin/container-structure-test test --image ${{ github.repository }}:${{ github.sha }}-pr --config tests/container-structure-test.yaml

  build-and-push-dev-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    needs: pr-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_DEV_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_DEV_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest-dev

  promote-to-stage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Promote Dev image to Stage
        run: |
          docker pull ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_DEV_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest-dev
          docker tag ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_DEV_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest-dev ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_STAGE_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest-stage
          docker push ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_STAGE_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest-stage

      - name: Scan Stage image for vulnerabilities
        uses: aquasecurity/trivy-action@v2
        with:
          image-ref: ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_STAGE_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest-stage
          format: table
          exit-code: '1'

  promote-to-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Promote Stage image to Prod
        run: |
          docker pull ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_STAGE_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest-stage
          docker tag ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_STAGE_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest-stage ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_PROD_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest-prod
          docker push ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_PROD_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest-prod

      - name: Scan Prod image for vulnerabilities
        uses: aquasecurity/trivy-action@v2
        with:
          image-ref: ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_PROD_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest-prod
          format: table
          exit-code: '1'

      - name: Sign Prod image with Cosign
        uses: sigstore/cosign-action@v2
        with:
          command: sign
          image: ${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_PROD_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest-prod
          key: ${{ env.COSIGN_KEY }}
          password: ${{ env.COSIGN_PASSWORD }}
