name: Main Workflow 🚀

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  IMAGE_NAME: test-pipeline
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
  COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
  COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}

jobs:
  vulnerability-scans:
    name: Vulnerability Scans 🛡
    runs-on: ubuntu-latest
    steps:
      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Scan Staging image for vulnerabilities
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY_HOST }}/stg/${{ env.IMAGE_NAME }}:staging
          format: table
          output: trivy-report.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Add vulnerability scan result to summary
        if: always()
        run: |
          {
            echo "## Staging Vulnerability Scan"
            echo
            if [ -s trivy-report.txt ]; then
              echo '```text'
              cat trivy-report.txt
              echo '```'
            elif [ "${{ steps.trivy.outcome }}" = "failure" ]; then
              echo "Trivy failed before producing a report."
              echo
              echo "Image: \`${REGISTRY_HOST}/stg/${IMAGE_NAME}:staging\`"
            else
              echo "No vulnerability scan findings reported."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail vulnerability scan on findings
        if: steps.trivy.outcome == 'failure'
        run: |
          echo "Trivy scan failed for ${REGISTRY_HOST}/stg/${IMAGE_NAME}:staging. Check the Staging Vulnerability Scan summary above."
          if [ -s trivy-report.txt ]; then
            echo
            cat trivy-report.txt
          fi
          exit 1

  crane:
    name: Promote, Attach SBOM, and Sign Prod Image 🚀
    runs-on: ubuntu-latest
    needs: vulnerability-scans
    steps:
      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Set prod image reference
        id: prod_image
        run: |
          short_sha="${GITHUB_SHA::7}"
          image_ref="${REGISTRY_HOST}/prd/${IMAGE_NAME}:${short_sha}"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Install Syft
        run: |
          curl --fail --silent --show-error --location https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft version

      - name: Promote Stage image to Prod
        id: promote
        run: |
          docker pull ${{ env.REGISTRY_HOST }}/stg/${{ env.IMAGE_NAME }}:staging
          docker tag ${{ env.REGISTRY_HOST }}/stg/${{ env.IMAGE_NAME }}:staging ${{ steps.prod_image.outputs.image_ref }}
          docker push ${{ steps.prod_image.outputs.image_ref }} | tee docker-push.log

          digest="$(grep -Eo 'digest: sha256:[a-f0-9]+' docker-push.log | tail -n 1 | awk '{print $2}')"
          if [ -z "$digest" ]; then
            echo "Could not find pushed image digest in docker push output."
            exit 1
          fi

          image_digest="${REGISTRY_HOST}/prd/${IMAGE_NAME}@${digest}"

          echo "image=${{ steps.prod_image.outputs.image_ref }}" >> "$GITHUB_OUTPUT"
          echo "image_digest=${image_digest}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM from local image
        run: |
          set -x
          syft docker:${{ steps.prod_image.outputs.image_ref }} -o spdx-json=sbom.spdx.json
          test -s sbom.spdx.json

      - name: Sign image digest with Cosign
        run: |
          if [ -z "${COSIGN_KEY}" ]; then
            echo "COSIGN_KEY secret is empty."
            exit 1
          fi

          cosign sign --yes \
            --key env://COSIGN_KEY \
            -a "repository=${{ github.repository }}" \
            -a "workflow=${{ github.workflow }}" \
            -a "run_id=${{ github.run_id }}" \
            -a "git_ref=${{ github.ref_name }}" \
            -a "git_sha=${{ github.sha }}" \
            -a "image_tag=${{ steps.promote.outputs.image }}" \
            "${{ steps.promote.outputs.image_digest }}"

      - name: Verify Cosign signature
        id: verify_signature
        run: |
          if [ -z "${COSIGN_PUBLIC_KEY}" ]; then
            echo "COSIGN_PUBLIC_KEY secret is empty."
            exit 1
          fi

          cosign verify --key env://COSIGN_PUBLIC_KEY "${{ steps.promote.outputs.image_digest }}" | tee cosign-verify.json
          jq -e --arg git_sha "${GITHUB_SHA}" --arg image_tag "${{ steps.promote.outputs.image }}" \
            '.[0].optional.git_sha == $git_sha and .[0].optional.image_tag == $image_tag' \
            cosign-verify.json

          signature_ref="$(cosign triangulate "${{ steps.promote.outputs.image_digest }}")"
          echo "signature_ref=${signature_ref}" >> "$GITHUB_OUTPUT"

      - name: Attach SBOM to signed image
        run: cosign attach sbom --sbom sbom.spdx.json "${{ steps.promote.outputs.image_digest }}"

      - name: Verify SBOM attachment
        id: verify_sbom
        run: |
          cosign download sbom "${{ steps.promote.outputs.image_digest }}" > downloaded-sbom.spdx.json
          test -s downloaded-sbom.spdx.json

          sbom_ref="$(cosign triangulate --type sbom "${{ steps.promote.outputs.image_digest }}")"
          echo "sbom_ref=${sbom_ref}" >> "$GITHUB_OUTPUT"

      - name: Add signing result to summary
        if: always()
        run: |
          {
            echo "## Image Signing"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Image | \`${{ steps.promote.outputs.image }}\` |"
            echo "| Digest | \`${{ steps.promote.outputs.image_digest }}\` |"
            echo "| Signature artifact | \`${{ steps.verify_signature.outputs.signature_ref }}\` |"
            echo "| SBOM artifact | \`${{ steps.verify_sbom.outputs.sbom_ref }}\` |"
            echo "| Git SHA | \`${{ github.sha }}\` |"
            echo "| Workflow run | \`${{ github.run_id }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  semantic-release:
    name: Semantic Release 🚀
    if: contains(github.event.head_commit.message, 'Merge pull request')
    runs-on: ubuntu-latest
    needs: crane
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/npm

      - name: Run semantic-release
        run: npx semantic-release --debug
