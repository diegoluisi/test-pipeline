name: Main Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: test-pipeline
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
  COSIGN_KEY: ${{ secrets.COSIGN_KEY }}

jobs:
  promote-to-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Install Crane
        run: |
          curl -Lo crane.tar.gz https://github.com/google/go-containerregistry/releases/download/v0.19.0/go-containerregistry_Linux_x86_64.tar.gz
          tar -xzf crane.tar.gz crane
          chmod +x crane
          sudo mv crane /usr/local/bin/

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Get short SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Promote Stage image to Prod using Crane
        run: |
          crane copy ${{ env.REGISTRY_HOST }}/stg/${{ env.IMAGE_NAME }}:latest-stage ${{ env.REGISTRY_HOST }}/prd/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}-prd

      - name: Scan Prod image for vulnerabilities
        uses: aquasecurity/trivy-action@v2
        with:
          image-ref: ${{ env.REGISTRY_HOST }}/prd/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}-prd
          format: table
          exit-code: '1'

      - name: Sign Prod image with Cosign
        uses: sigstore/cosign-action@v2
        with:
          command: sign
          image: ${{ env.REGISTRY_HOST }}/prd/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}-prd
          key: ${{ env.COSIGN_KEY }}
          password: ${{ env.COSIGN_PASSWORD }}

  semantic-release:
    needs: promote-to-prod
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
      DOCKER_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install semantic-release
        run: npm install -g semantic-release @semantic-release/git @codedependant/semantic-release-docker

      - name: Run semantic-release
        run: npx semantic-release
