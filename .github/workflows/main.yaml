name: Main Workflow 🚀

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: test-pipeline
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
  COSIGN_KEY: ${{ secrets.COSIGN_KEY }}

jobs:
  crane:
    name: Promote to Prod 🚀
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.vars.outputs.image_ref }}
      short-sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Install Crane
        run: |
          curl --fail --location --show-error --output crane.tar.gz https://github.com/google/go-containerregistry/releases/download/v0.19.0/go-containerregistry_Linux_x86_64.tar.gz
          tar -xzf crane.tar.gz crane
          chmod +x crane
          sudo mv crane /usr/local/bin/
          crane version

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Get short SHA
        id: vars
        run: |
          short_sha="${GITHUB_SHA::7}"
          image_ref="${REGISTRY_HOST}/prd/${IMAGE_NAME}:${short_sha}-prd"
          echo "SHORT_SHA=${short_sha}" >> "$GITHUB_ENV"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Promote Stage image to Prod using Crane
        run: |
          crane copy ${{ env.REGISTRY_HOST }}/stg/${{ env.IMAGE_NAME }}:staging ${{ steps.vars.outputs.image_ref }}

  vulnerability-scans:
    name: Vulnerability Scans 🛡
    runs-on: ubuntu-latest
    needs: crane
    steps:
      - name: Scan Prod image for vulnerabilities
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ needs.crane.outputs.image-ref }}
          format: table
          output: trivy-report.txt
          exit-code: '1'

      - name: Add vulnerability scan result to summary
        if: always()
        run: |
          {
            echo "## Prod Vulnerability Scan"
            echo
            if [ -s trivy-report.txt ]; then
              echo '```text'
              cat trivy-report.txt
              echo '```'
            elif [ "${{ steps.trivy.outcome }}" = "failure" ]; then
              echo "Trivy failed before producing a report."
              echo
              echo "Image: \`${{ needs.crane.outputs.image-ref }}\`"
            else
              echo "No vulnerability scan findings reported."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail vulnerability scan on findings
        if: steps.trivy.outcome == 'failure'
        run: exit 1

  cosign:
    name: Sign Prod Image with Cosign 🔏
    runs-on: ubuntu-latest
    needs:
      - crane
      - vulnerability-scans
    steps:
      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v2.0.0

      - name: Sign image with Cosign
        run: cosign sign --yes --key env://COSIGN_KEY ${{ needs.crane.outputs.image-ref }}

  semantic-release:
    name: Semantic Release 🚀
    needs: cosign
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
      DOCKER_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install semantic-release
        run: npm install -g semantic-release @semantic-release/git @codedependant/semantic-release-docker

      - name: Run semantic-release
        run: npx semantic-release
