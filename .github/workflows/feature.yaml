name: Feature Workflow 🌱

on:
  pull_request:
    branches:
      - 'develop'

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  IMAGE_NAME: test-pipeline

jobs:
  validate-pr:
    name: Validate PR Metadata ✅
    runs-on: ubuntu-latest
    steps:
      - name: Validate pull request title and branch name
        id: validate
        continue-on-error: true
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          status=0
          feedback=""

          case "$BRANCH_NAME" in
            feat/*|feature/*|fix/*|hotfix/*|chore/*)
              branch_result="Passed"
              ;;
            *)
              branch_result="Failed"
              feedback="${feedback}- Source branch must start with one of: \`feat/\`, \`feature/\`, \`fix/\`, \`hotfix/\`, \`chore/\`. Current branch: \`${BRANCH_NAME}\`"$'\n'
              status=1
              ;;
          esac

          case "$PR_TITLE" in
            feat:*|feat\(*|feature:*|feature\(*|fix:*|fix\(*|hotfix:*|hotfix\(*|chore:*|chore\(*)
              title_result="Passed"
              ;;
            *)
              title_result="Failed"
              feedback="${feedback}- Pull request title must start with a conventional prefix such as \`feat:\`, \`fix:\`, \`hotfix:\`, or \`chore:\`. Current title: \`${PR_TITLE}\`"$'\n'
              status=1
              ;;
          esac

          {
            echo "## Pull Request Metadata"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Source branch name | ${branch_result} |"
            echo "| Pull request title | ${title_result} |"
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo "status=${status}"
            echo "feedback<<EOF"
            printf "%s" "$feedback"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          exit "$status"

      - name: Comment PR validation feedback
        if: steps.validate.outcome == 'failure'
        uses: actions/github-script@v8
        env:
          VALIDATION_FEEDBACK: ${{ steps.validate.outputs.feedback }}
        with:
          script: |
            const feedback = process.env.VALIDATION_FEEDBACK.trim();
            const body = [
              '## Pull request metadata check failed',
              '',
              feedback,
              '',
              'Please update the source branch name or pull request title, then re-run the workflow.'
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail PR validation
        if: steps.validate.outcome == 'failure'
        run: exit 1

  product-level-test:
    name: Product Level Test 🧪
    runs-on: ubuntu-latest
    needs: validate-pr
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Run product-level test
        id: product_level_test
        continue-on-error: true
        run: |
          set +e
          make product-level-test > product-level-test.log 2>&1
          test_status=$?

          {
            echo "## Product Level Test"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            if [ "$test_status" -eq 0 ]; then
              echo "| \`make product-level-test\` | Passed |"
            else
              echo "| \`make product-level-test\` | Failed |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$test_status"

  dockerfile-lint:
    name: Dockerfile Lint 🐳
    runs-on: ubuntu-latest
    needs: product-level-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Run hadolint
        id: hadolint
        continue-on-error: true
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint-results.sarif

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: hadolint-results.sarif
          wait-for-processing: true

  build-image:
    name: Build Docker Image 🏗️
    runs-on: ubuntu-latest
    needs: dockerfile-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build multi-platform image for PR validation
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          outputs: type=cacheonly

      - name: Build image for PR validation
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ github.repository }}:${{ github.sha }}

      - name: Verify image exists
        run: docker inspect ${{ github.repository }}:${{ github.sha }}

      - name: Save Docker image
        run: docker save ${{ github.repository }}:${{ github.sha }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.IMAGE_NAME }}
          path: image.tar

  scan-vulnerabilities:
    name: Scan for Vulnerabilities 🛡️
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ env.IMAGE_NAME }}

      - name: Load Docker image
        run: docker load < image.tar

      - name: Scan image for vulnerabilities
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ github.repository }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  sbom-report:
    name: Generate SBOM 📊
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Download image artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ env.IMAGE_NAME }}

      - name: Load Docker image
        run: docker load < image.tar

      - name: Install Syft for SBOM generation
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft . -o json > sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sbom
          path: sbom.json

  test-container-structure:
    name: Test Container Structure 🧪
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Download image artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ env.IMAGE_NAME }}

      - name: Load Docker image
        run: docker load < image.tar

      - name: Install container structure test
        run: |
          curl --fail --location --show-error --output /usr/local/bin/container-structure-test https://github.com/GoogleContainerTools/container-structure-test/releases/latest/download/container-structure-test-linux-amd64
          chmod +x /usr/local/bin/container-structure-test
          /usr/local/bin/container-structure-test version

      - name: Run container structure test
        run: |
          /usr/local/bin/container-structure-test test --image ${{ github.repository }}:${{ github.sha }} --config tests/container-structure-test.yaml
