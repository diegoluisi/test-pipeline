name: Feature Workflow 🌱

on:
  pull_request:
    branches:
      - 'develop'

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  IMAGE_NAME: test-pipeline

jobs:
  dockerfile-lint:
    name: Dockerfile Lint 🐳
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Run hadolint
        id: hadolint
        continue-on-error: true
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint-results.sarif

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: hadolint-results.sarif
          wait-for-processing: true

  build-image:
    name: Build Docker Image 🏗️
    runs-on: ubuntu-latest
    needs: dockerfile-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build image for PR validation
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ github.repository }}:${{ github.sha }}

      - name: Verify image exists
        run: docker inspect ${{ github.repository }}:${{ github.sha }}

      - name: Save Docker image
        run: docker save ${{ github.repository }}:${{ github.sha }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.IMAGE_NAME }}
          path: image.tar

  scan-vulnerabilities:
    name: Scan for Vulnerabilities 🛡️
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ env.IMAGE_NAME }}

      - name: Load Docker image
        run: docker load < image.tar

      - name: Scan image for vulnerabilities
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ github.repository }}:${{ github.sha }}
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0' # Don't fail here; we already enforced exit-code:1 above

      - name: Upload scan report as artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: trivy-scan-report
          path: trivy-report.json
          retention-days: 30

  sbom-report:
    name: Generate SBOM 📊
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Download image artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ env.IMAGE_NAME }}

      - name: Load Docker image
        run: docker load < image.tar

      - name: Install Syft for SBOM generation
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft . -o json > sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sbom
          path: sbom.json

  test-container-structure:
    name: Test Container Structure 🧪
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Download image artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ env.IMAGE_NAME }}

      - name: Load Docker image
        run: docker load < image.tar

      - name: Install container structure test
        run: |
          curl --fail --location --show-error --output /usr/local/bin/container-structure-test https://github.com/GoogleContainerTools/container-structure-test/releases/latest/download/container-structure-test-linux-amd64
          chmod +x /usr/local/bin/container-structure-test
          /usr/local/bin/container-structure-test version

      - name: Run container structure test
        run: |
          /usr/local/bin/container-structure-test test --image ${{ github.repository }}:${{ github.sha }} --config tests/container-structure-test.yaml
