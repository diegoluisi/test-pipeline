name: Feature Workflow 🌱

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - 'feat/**'
      - 'feature/**'
      - 'hotfix/**'
      - 'fix/**'
      - 'chore/**'

env:
  IMAGE_NAME: test-pipeline

jobs:
  dockerfile-lint:
    name: Dockerfile Lint 🐳
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Lint Dockerfile
        id: hadolint
        continue-on-error: true
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          output-file: hadolint-report.txt

      - name: Add Dockerfile lint result to summary
        if: always()
        run: |
          {
            echo "## Dockerfile Lint"
            echo
            if [ -s hadolint-report.txt ]; then
              echo '```text'
              cat hadolint-report.txt
              echo '```'
            else
              echo "No Dockerfile lint issues found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail Dockerfile lint on issues
        if: steps.hadolint.outcome == 'failure'
        run: exit 1

  build-image:
    name: Build Docker Image 🏗️
    runs-on: ubuntu-latest
    needs: dockerfile-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build image for PR validation
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ github.repository }}:${{ github.sha }}-pr

      - name: Verify image exists
        run: docker inspect ${{ github.repository }}:${{ github.sha }}-pr

      - name: Save Docker image
        run: docker save ${{ github.repository }}:${{ github.sha }}-pr -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-image
          path: image.tar

  scan-vulnerabilities:
    name: Scan for Vulnerabilities 🛡️
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-image

      - name: Load Docker image
        run: docker load < image.tar

      - name: Scan image for vulnerabilities
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ github.repository }}:${{ github.sha }}-pr
          format: table
          output: trivy-report.txt
          exit-code: '1'

      - name: Add vulnerability scan result to summary
        if: always()
        run: |
          {
            echo "## Vulnerability Scan"
            echo
            if [ -s trivy-report.txt ]; then
              echo '```text'
              cat trivy-report.txt
              echo '```'
            else
              echo "No vulnerability scan findings reported."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail vulnerability scan on findings
        if: steps.trivy.outcome == 'failure'
        run: exit 1

  sbom-report:
    name: Generate SBOM 📊
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-image

      - name: Load Docker image
        run: docker load < image.tar

      - name: Install Syft for SBOM generation
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft . -o json > sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  test-container-structure:
    name: Test Container Structure 🧪
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-image

      - name: Load Docker image
        run: docker load < image.tar

      - name: Install container structure test
        run: |
          curl --fail --location --show-error --output /usr/local/bin/container-structure-test https://github.com/GoogleContainerTools/container-structure-test/releases/latest/download/container-structure-test-linux-amd64
          chmod +x /usr/local/bin/container-structure-test
          /usr/local/bin/container-structure-test version

      - name: Run container structure test
        run: |
          /usr/local/bin/container-structure-test test --image ${{ github.repository }}:${{ github.sha }}-pr --config tests/container-structure-test.yaml
