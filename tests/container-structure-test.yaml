schemaVersion: "2.0.0"

fileExistenceTests:
  - name: App directory exists
    path: /app
    shouldExist: true
  - name: Application binary exists
    path: /app/hello
    shouldExist: true

commandTests:
  - name: Check application present
    command: "test"
    args: ["-x", "/app/hello"]
    exitCode: 0
